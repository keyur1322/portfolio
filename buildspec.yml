version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm install
  build:
    commands:
      - npm run build
      - echo "✅ Build successful"
      - mkdir -p build-artifact
      - cp -r build/* build-artifact/
artifacts:
  base-directory: build-artifact
  files:
    - '**/*'